name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm validate
      - name: indices up-to-date
        run: |
          pnpm build-index
          git diff --exit-code index.md index.json search.json || {
            echo "::error::committed indices are stale — run 'pnpm build-index' locally and recommit" >&2
            exit 1
          }
      # Secret scanning runs locally via the `.husky/pre-commit` hook
      # (`gitleaks protect --staged`, the OSS CLI — no license needed).
      # The gitleaks-action was removed from CI: gitleaks-action@v2 requires a
      # paid GITLEAKS_LICENSE for organization repos and fails without it.
