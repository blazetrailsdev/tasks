# gitleaks config for blazetrailsdev/rfcs
#
# Extends gitleaks' default ruleset and adds allowlist tuning for a
# markdown-only repo where most "matches" are documentation examples.
# Run locally:  gitleaks protect --staged --config .gitleaks.toml
# Run on history: gitleaks detect --config .gitleaks.toml

[extend]
useDefault = true

[allowlist]
description = "Global allowlist for documentation patterns"

paths = [
  '''node_modules/''',
  '''\.husky/''',
  '''package-lock\.json''',
  '''pnpm-lock\.yaml''',
]

# Common false positives in RFC prose: placeholder tokens, example
# UUIDs, fenced code blocks demonstrating shapes (not real secrets).
regexes = [
  # placeholder/example tokens
  '''(?i)(your[-_]?(api[-_]?)?(key|token|secret)|example[-_]?(key|token|secret)|REPLACE[-_]?ME|<[A-Z_]+>|xxx+)''',
  # example UUIDs / hash-like strings inside fenced code
  '''(?i)example[-_:][\w-]+''',
]
